<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебе ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fff0f5; /* Ніжно-рожевий фон */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            color: #4a4a4a;
        }
        h1 {
            color: #d6336c;
            margin-bottom: 5px;
            font-size: 2.5rem;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: #666;
        }
        .video-container {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(214, 51, 108, 0.2);
            max-width: 90%;
        }
        video {
            border-radius: 12px;
            max-width: 100%;
            height: auto;
        }
        .emojis {
            font-size: 2.5rem;
            margin-top: 25px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }
    </style>
</head>
<body>

    <h1>Привіт, моя Пандочко Бубу! 🐼</h1>
    <p>Ведмедик Дуду чекає біля Сільпо... 🐻❤️</p>

    <div class="video-container">
        <!-- Важливо: назва файлу тут має точно збігатися з назвою твого відео -->
        <video width="700" controls autoplay loop muted playsinline>
            <source src="love_story.mp4" type="video/mp4">
            Твій браузер не підтримує відтворення відео.
        </video>
    </div>

    <div class="emojis">☕ 🛒 🏙️</div>

</body>
</html>
